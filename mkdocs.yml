site_name: apexe
site_description: Outside-In CLI-to-Agent Bridge — automatically wraps CLI tools into governed apcore modules, served via MCP.
site_url: https://aiperceivable.github.io/apexe/

repo_name: aiperceivable/apexe
repo_url: https://github.com/aiperceivable/apexe

theme:
  name: material
  logo: assets/apexe-logo.svg
  favicon: assets/apexe-logo.svg
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - User Manual: user-manual.md
  - Changelog: changelog.md
  - Architecture:
      - Technical Design: apcore-integration/tech-design.md
      - Feature Manifest: FEATURE_MANIFEST.md
  - Feature Specs:
      - Overview: features/v2-overview.md
      - F1 - Scanner Adapter: features/v2-f1-scanner-adapter.md
      - F2 - Module Executor: features/v2-f2-module-executor.md
      - F3 - Binding Output: features/v2-f3-binding-output.md
      - F4 - MCP Server: features/v2-f4-mcp-server.md
      - F5 - Governance: features/v2-f5-governance.md
      - F6 - Error Migration: features/v2-f6-error-migration.md
      - F7 - Config Integration: features/v2-f7-config-integration.md
  - Examples: examples.md
