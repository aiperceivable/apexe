site_name: apexe
site_description: Outside-In CLI-to-Agent Bridge — automatically wraps CLI tools into governed apcore modules, served via MCP/A2A.
site_url: https://aiperceivable.github.io/apexe/

repo_name: aiperceivable/apexe
repo_url: https://github.com/aiperceivable/apexe

theme:
  name: material
  logo: assets/apexe-logo.svg
  favicon: assets/apexe-logo.svg
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Manual: user-manual.md
  - Technical Design: tech-design.md
  - Feature Manifest: FEATURE_MANIFEST.md
  - Feature Specs:
      - Overview: features/overview.md
      - F1 - Project Skeleton: features/f1-project-skeleton.md
      - F2 - CLI Scanner Engine: features/f2-cli-scanner-engine.md
      - F3 - Binding Generator: features/f3-binding-generator.md
      - F4 - Serve Integration: features/f4-serve-integration.md
      - F5 - Governance Defaults: features/f5-governance-defaults.md
